name: AI Daily Briefing

on:
  schedule:
    # UTC 22:00 = KST 07:00 (매일 아침 7시)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python ai_daily_briefing.py

      - name: Copy to docs (GitHub Pages source)
        run: |
          # Jekyll 비활성화
          touch docs/.nojekyll
          # 최신 브리핑을 index.html로 복사
          LATEST=$(ls -t output/ai_briefing_*.html 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" docs/index.html
            # 아카이브도 복사 (날짜별 보관)
            cp output/ai_briefing_*.html docs/ 2>/dev/null || true
            cp output/ai_briefing_*.json docs/ 2>/dev/null || true
            echo "✅ Copied $LATEST to docs/index.html"
          else
            echo "❌ No briefing file found"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ output/
          git diff --cached --quiet || git commit -m "📰 AI Daily Briefing $(date +%Y-%m-%d)"
          git push

      - name: Send email to subscribers
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 send_email.py
